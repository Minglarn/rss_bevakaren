name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/minglarn/rss_bevakaren_backend
            ghcr.io/minglarn/rss_bevakaren_frontend

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/minglarn/rss_bevakaren_backend:latest
            ghcr.io/minglarn/rss_bevakaren_backend:${{ github.sha }}
            ghcr.io/minglarn/rss_bevakaren_backend:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/minglarn/rss_bevakaren_frontend:latest
            ghcr.io/minglarn/rss_bevakaren_frontend:${{ github.sha }}
            ghcr.io/minglarn/rss_bevakaren_frontend:${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
