# version: '3.8'

services:
  backend:
    image: ghcr.io/minglarn/rss_bevakaren_backend:v2026.07.2
    ports:
      - "8094:8000"
    volumes:
      # Lagra databasen i en dedikerad data-mapp på hosten så den överlever omstarter
      - ./data:/data
    environment:
      - TZ=Europe/Stockholm
      - DATABASE_URL=sqlite:////data/rss.db
      # Multi-user setup: Separera med kommatecken. Ordningen matchar.
      - APP_USERNAME=admin,wife
      - APP_PASSWORD=admin_password,wife_password
    restart: unless-stopped

  frontend:
    image: ghcr.io/minglarn/rss_bevakaren_frontend:v2026.07.2
    ports:
      - "8093:80"
    environment:
      - TZ=Europe/Stockholm
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend
